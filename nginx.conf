server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /ibec {
        return 301 /ibec/;
    }

    # Frontend is built with base '/ibec/', so map that prefix back to dist root.
    location /ibec/ {
        rewrite ^/ibec/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # Frontend axios interceptor rewrites '/api/*' to '/ibec/api/*'.
    location /ibec/api/ {
        rewrite ^/ibec/api/(.*)$ /api/$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }
}
